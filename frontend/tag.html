<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Core Styles -->
<link rel="stylesheet" type="text/css" href="/styles/bootstrap4/bootstrap.min.css">
<link href="/plugins/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" type="text/css" href="/plugins/OwlCarousel2-2.2.1/owl.carousel.css">
<link rel="stylesheet" type="text/css" href="/plugins/OwlCarousel2-2.2.1/owl.theme.default.css">
<link rel="stylesheet" type="text/css" href="/plugins/OwlCarousel2-2.2.1/animate.css">

<!-- Main Styles -->
<link rel="stylesheet" type="text/css" href="/styles/main_styles.css">
<link rel="stylesheet" type="text/css" href="/styles/responsive.css">

<!-- Tag Page Styles -->
<link rel="stylesheet" type="text/css" href="/styles/tag/base.css">
<link rel="stylesheet" type="text/css" href="/styles/tag/tags.css">
<link rel="stylesheet" type="text/css" href="/styles/tag/articles.css">
<link rel="stylesheet" type="text/css" href="/styles/tag/responsive.css">
<link rel="stylesheet" type="text/css" href="/styles/tag/dark-mode.css">

</head>
<body>
<div class="super_container">

	<!-- Header -->
	<header class="header">
		<!-- Brand Bar -->
		<div class="header_brand_bar">
			<div class="container">
				<div class="header_brand_content d-flex flex-row align-items-center justify-content-between">
					<div class="logo_container">
						<a href="/">
							<div class="logo_text"></div>
						</a>
					</div>
					<div class="header_brand_actions d-flex align-items-center">
						<div class="brand-rate-btns"></div>
						<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
							<i class="fa fa-moon-o" aria-hidden="true"></i>
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Nav Bar -->
		<div class="header_nav_bar">
			<div class="container">
				<div class="header_nav_content d-flex flex-row align-items-center">
					<nav class="main_nav_contaner">
						<ul class="main_nav">
						</ul>
					</nav>
					<div class="header_nav_right d-flex align-items-center ml-auto">
						<div class="search_button"><i class="fa fa-search" aria-hidden="true"></i></div>
						<div class="hamburger menu_mm">
							<i class="fa fa-bars menu_mm" aria-hidden="true"></i>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Search Panel -->
		<div class="header_search_container">
			<div class="container">
				<div class="row">
					<div class="col">
						<div class="header_search_content d-flex flex-row align-items-center justify-content-end">
							<form action="#" class="header_search_form">
								<input type="search" class="search_input" placeholder="Search" required="required">
								<button class="header_search_button d-flex flex-column align-items-center justify-content-center">
									<i class="fa fa-search" aria-hidden="true"></i>
								</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</header>

	<!-- Breadcrumb -->
	<div class="breadcrumb-container">
		<div class="container">
			<nav aria-label="breadcrumb">
				<ol class="breadcrumb" id="breadcrumb-list">
					<li class="breadcrumb-item"><a href="/">Home</a></li>
					<li class="breadcrumb-item"><a href="/tags">Tags</a></li>
					<li class="breadcrumb-item active" id="breadcrumb-tag">Loading...</li>
				</ol>
			</nav>
		</div>
	</div>

	<!-- Tag Info Bar -->
	<div class="ti-info-bar">
		<div class="container">
			<div class="ti-info-content">
				<div class="ti-icon-wrap">
					<i class="fa fa-tag"></i>
				</div>
				<div class="ti-info-text">
					<h1 class="ti-info-name" id="tag-title">Loading...</h1>
					<div class="ti-info-desc" id="tag-desc" style="display:none;"></div>
					<div class="ti-info-stats">
						<span class="ti-info-stat" id="tag-article-count">
							<i class="fa fa-newspaper-o"></i> <span>0</span> articles
						</span>
					</div>
					<!-- Related Tags -->
					<div class="ti-tags-section" id="related-tags-section" style="display:none;">
						<span class="ti-tags-label">Related</span>
						<div class="ti-tags-row" id="related-tags-row"></div>
					</div>
					<!-- Similar Tags -->
					<div class="ti-tags-section" id="similar-tags-section" style="display:none;">
						<span class="ti-tags-label">Similar</span>
						<div class="ti-tags-row" id="similar-tags-row"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Main Content Area -->
	<div class="articles-main-container">
		<div class="container">
			<div id="featured-article-wrapper"></div>
			<div id="articles-container">
				<div class="loading-container">
					<div class="spinner"></div>
					<p>Loading articles...</p>
				</div>
			</div>
		</div>
	</div>

	<!-- Pagination -->
	<div class="pagination-container" id="pagination-container" style="display: none;">
		<div class="container">
			<nav aria-label="Page navigation">
				<ul class="pagination" id="pagination">
				</ul>
			</nav>
		</div>
	</div>

	<!-- Footer -->
	<footer class="footer">
		<div class="footer-info-bar">
			<div class="container">
				<div class="footer-info-grid">
					<!-- Col 1: Brand -->
					<div class="footer-col footer-col-brand">
						<div class="footer-brand-text"></div>
						<div class="footer-brand-desc"></div>
						<ul class="footer-social-list"></ul>
					</div>
				<!-- Col 2: Newsletter -->
				<div class="footer-col footer-col-newsletter">
					<div class="footer-col-title">Newsletter</div>
					<p class="footer-newsletter-desc">Get the latest finance insights delivered to your inbox.</p>
					<form class="footer-subscribe-form" id="footer-subscribe-form" novalidate>
						<div class="footer-subscribe-input-wrap">
							<input type="email" id="footer-subscribe-email" class="footer-subscribe-input" placeholder="Your email address" autocomplete="email" required>
						</div>
						<button type="submit" class="footer-subscribe-btn">Subscribe</button>
						<p class="footer-subscribe-msg" id="footer-subscribe-msg" aria-live="polite"></p>
					</form>
				</div>
					<!-- Col 3: Mobile -->
					<div class="footer-col footer-col-mobile">
						<div class="footer-col-title footer-mobile-title"></div>
						<div class="footer-app-badges"></div>
					</div>
				</div>
			</div>
		</div>
		<div class="footer-links-section">
			<div class="container">
				<div class="footer-nav-bar">
					<ul class="footer-nav-left"></ul>
					<ul class="footer-nav-right"></ul>
				</div>
				<div class="footer-bottom">
					<div class="cr_text"></div>
				</div>
			</div>
		</div>
	</footer>

</div>

<script src="/js/header.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/dark-mode.js"></script>

</body>
</html>
