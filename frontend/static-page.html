<!DOCTYPE html>

<head>

<meta name="twitter:title" content="" id="twitter-title">
<meta name="twitter:description" content="" id="twitter-description">

<!-- JSON-LD Schema -->
<script type="application/ld+json" id="schema-breadcrumb"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Core Styles -->
<link rel="stylesheet" type="text/css" href="/styles/bootstrap4/bootstrap.min.css">
<link href="/plugins/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet" type="text/css">

<!-- Main Styles -->
<link rel="stylesheet" type="text/css" href="/styles/main_styles.css">
<link rel="stylesheet" type="text/css" href="/styles/responsive.css">
<link rel="stylesheet" href="/styles/cookie-consent.css">

<!-- Static Page Styles -->
<link rel="stylesheet" type="text/css" href="/styles/static-page.css">

</head>
<body>
<div class="super_container">

	<!-- Header -->
	<header class="header">
		<!-- Brand Bar -->
		<div class="header_brand_bar">
			<div class="container">
				<div class="header_brand_content d-flex flex-row align-items-center justify-content-between">
					<div class="logo_container">
						<a href="/">
							<div class="logo_text"></div>
						</a>
					</div>
					<div class="header_brand_actions d-flex align-items-center">
						<div class="brand-rate-btns"></div>
						<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
							<i class="fa fa-moon-o" aria-hidden="true"></i>
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Nav Bar -->
		<div class="header_nav_bar">
			<div class="container">
				<div class="header_nav_content d-flex flex-row align-items-center">
					<nav class="main_nav_contaner">
						<ul class="main_nav">
						</ul>
					</nav>
					<div class="header_nav_right d-flex align-items-center ml-auto">
						<div class="search_button"><i class="fa fa-search" aria-hidden="true"></i></div>
						<div class="hamburger menu_mm">
							<i class="fa fa-bars menu_mm" aria-hidden="true"></i>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Search Panel -->
		<div class="header_search_container">
			<div class="container">
				<div class="row">
					<div class="col">
						<div class="header_search_content d-flex flex-row align-items-center justify-content-end">
							<form action="#" class="header_search_form">
								<input type="search" class="search_input" placeholder="Search" required="required">
								<button class="header_search_button d-flex flex-column align-items-center justify-content-center" aria-label="Search">
									<i class="fa fa-search" aria-hidden="true"></i>
								</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</header>

	<!-- Menu -->
	<div class="menu d-flex flex-column align-items-end justify-content-start text-right menu_mm trans_400">
		<div class="menu_close_container"><div class="menu_close"><div></div><div></div></div></div>
		<div class="search">
			<form action="#" class="header_search_form menu_mm">
				<input type="search" class="search_input menu_mm" placeholder="Search" required="required">
				<button class="header_search_button d-flex flex-column align-items-center justify-content-center menu_mm" aria-label="Search">
					<i class="fa fa-search menu_mm" aria-hidden="true"></i>
				</button>
			</form>
		</div>
		<nav class="menu_nav">
			<ul class="menu_mm">
				<li class="menu_mm"><a href="/">Loading...</a></li>
			</ul>
		</nav>
	</div>

	<!-- Breadcrumb -->
	<div class="breadcrumb-container">
		<div class="container">
			<nav aria-label="breadcrumb">
				<ol class="breadcrumb">
					<li class="breadcrumb-item"><a href="/">Home</a></li>
					<li class="breadcrumb-item active" id="breadcrumb-page">Loading...</li>
				</ol>
			</nav>
		</div>
	</div>

	<!-- Page Content — info bar + body injected here by static-page.js -->
	<div class="static-page-container">
		<div class="static-page-content" id="page-content">
			<!-- Loading State -->
			<div class="loading-container" style="padding: 80px 20px; text-align:center;">
				<div class="spinner"></div>
				<p>Loading...</p>
			</div>
		</div>
	</div>

	<!-- Footer -->
	<footer class="footer">
		<div class="footer-info-bar">
			<div class="container">
				<div class="footer-info-grid">
					<!-- Col 1: Brand -->
					<div class="footer-col footer-col-brand">
						<div class="footer-brand-text"></div>
						<div class="footer-brand-desc"></div>
						<ul class="footer-social-list"></ul>
					</div>
				<!-- Col 2: Newsletter -->
				<div class="footer-col footer-col-newsletter">
					<div class="footer-col-title">Newsletter</div>
					<p class="footer-newsletter-desc">Get the latest finance insights delivered to your inbox.</p>
					<form class="footer-subscribe-form" id="footer-subscribe-form" novalidate>
						<div class="footer-subscribe-input-wrap">
							<input type="email" id="footer-subscribe-email" class="footer-subscribe-input" placeholder="Your email address" autocomplete="email" required>
						</div>
						<button type="submit" class="footer-subscribe-btn">Subscribe</button>
						<p class="footer-subscribe-msg" id="footer-subscribe-msg" aria-live="polite"></p>
					</form>
				</div>
					<!-- Col 3: Mobile -->
					<div class="footer-col footer-col-mobile">
						<div class="footer-col-title footer-mobile-title"></div>
						<div class="footer-app-badges"></div>
					</div>
				</div>
			</div>
		</div>
		<div class="footer-links-section">
			<div class="container">
				<div class="footer-nav-bar">
					<ul class="footer-nav-left"></ul>
					<ul class="footer-nav-right"></ul>
				</div>
				<div class="footer-bottom">
					<div class="cr_text"></div>
				</div>
			</div>
		</div>
	</footer>

</div>

<!-- Core Scripts -->
<script src="/js/jquery-3.2.1.min.js"></script>
<script src="/styles/bootstrap4/popper.js"></script>
<script src="/styles/bootstrap4/bootstrap.min.js"></script>

<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Strapi API Integration -->
<script src="/config.js"></script>
<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/site-data.js"></script>
<script src="/js/header.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/dark-mode.js"></script>
<script src="/js/static-page.js"></script>
<script src="/js/seo-preview.js"></script>
<script src="/js/custom.js"></script>

<script src="/js/cookie-consent.js"></script>
</body>
</html>
