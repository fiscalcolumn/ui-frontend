<!DOCTYPE html>

<head>

<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="description" content="" id="meta-description">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<link rel="canonical" href="" id="canonical-url">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="" id="og-url">
<meta property="og:title" content="" id="og-title">
<meta property="og:description" content="" id="og-description">
<meta property="og:image" content="/images/og-default.jpg" id="og-image">
<meta property="og:site_name" content="FiscalColumn">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="" id="twitter-title">
<meta name="twitter:description" content="" id="twitter-description">

<!-- JSON-LD Schema -->
<script type="application/ld+json" id="schema-breadcrumb"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Core Styles -->
<link rel="stylesheet" type="text/css" href="/styles/bootstrap4/bootstrap.min.css">
<link href="/plugins/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet" type="text/css">

<!-- Main Styles -->
<link rel="stylesheet" type="text/css" href="/styles/main_styles.css">
<link rel="stylesheet" type="text/css" href="/styles/responsive.css">

<!-- Static Page Styles -->
<link rel="stylesheet" type="text/css" href="/styles/static-page.css">

</head>
<body>
<div class="super_container">

	<!-- Header -->
	<header class="header">
		<!-- Brand Bar -->
		<div class="header_brand_bar">
			<div class="container">
				<div class="header_brand_content d-flex flex-row align-items-center justify-content-between">
					<div class="logo_container">
						<a href="/">
							<div class="logo_text"></div>
						</a>
					</div>
					<div class="header_brand_actions d-flex align-items-center">
						<a href="/gold-rate-today" class="brand-rate-btn gold">Gold Rates</a>
						<a href="/silver-rate-today" class="brand-rate-btn silver">Silver Rates</a>
						<button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
							<i class="fa fa-moon-o" aria-hidden="true"></i>
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Nav Bar -->
		<div class="header_nav_bar">
			<div class="container">
				<div class="header_nav_content d-flex flex-row align-items-center">
					<nav class="main_nav_contaner">
						<ul class="main_nav">
						</ul>
					</nav>
					<div class="header_nav_right d-flex align-items-center ml-auto">
						<div class="search_button"><i class="fa fa-search" aria-hidden="true"></i></div>
						<div class="hamburger menu_mm">
							<i class="fa fa-bars menu_mm" aria-hidden="true"></i>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Search Panel -->
		<div class="header_search_container">
			<div class="container">
				<div class="row">
					<div class="col">
						<div class="header_search_content d-flex flex-row align-items-center justify-content-end">
							<form action="#" class="header_search_form">
								<input type="search" class="search_input" placeholder="Search" required="required">
								<button class="header_search_button d-flex flex-column align-items-center justify-content-center">
									<i class="fa fa-search" aria-hidden="true"></i>
								</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</header>

	<!-- Menu -->
	<div class="menu d-flex flex-column align-items-end justify-content-start text-right menu_mm trans_400">
		<div class="menu_close_container"><div class="menu_close"><div></div><div></div></div></div>
		<div class="search">
			<form action="#" class="header_search_form menu_mm">
				<input type="search" class="search_input menu_mm" placeholder="Search" required="required">
				<button class="header_search_button d-flex flex-column align-items-center justify-content-center menu_mm">
					<i class="fa fa-search menu_mm" aria-hidden="true"></i>
				</button>
			</form>
		</div>
		<nav class="menu_nav">
			<ul class="menu_mm">
				<li class="menu_mm"><a href="/">Loading...</a></li>
			</ul>
		</nav>
	</div>

	<!-- Breadcrumb -->
	<div class="breadcrumb-container">
		<div class="container">
			<nav aria-label="breadcrumb">
				<ol class="breadcrumb">
					<li class="breadcrumb-item"><a href="/">Home</a></li>
					<li class="breadcrumb-item active" id="breadcrumb-page">Loading...</li>
				</ol>
			</nav>
		</div>
	</div>

	<!-- Page Content -->
	<div class="static-page-container">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-10">
					<div class="static-page-content" id="page-content">
						<!-- Loading State -->
						<div class="loading-container">
							<div class="spinner"></div>
							<p>Loading...</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Footer -->
	<footer class="footer">
		<div class="footer_background" style="background-image:url(/images/footer_background.png)"></div>
		<div class="container">
			<div class="row footer_row">
				<div class="col">
					<div class="footer_content">
						<div class="row">
							<div class="col-lg-3 footer_col">
								<div class="footer_section footer_about">
									<div class="footer_logo_container">
										<a href="/">
											<div class="footer_logo_text">Loading...</div>
										</a>
									</div>
									<div class="footer_about_text">
										<p>Loading...</p>
									</div>
									<div class="footer_social">
										<ul></ul>
									</div>
								</div>
							</div>
							<div class="col-lg-3 footer_col">
								<div class="footer_section footer_contact">
									<div class="footer_title">Contact Us</div>
									<div class="footer_contact_info">
										<ul><li>Loading...</li></ul>
									</div>
								</div>
							</div>
							<div class="col-lg-3 footer_col">
								<div class="footer_section footer_links">
									<div class="footer_title">Quick Links</div>
									<div class="footer_links_container">
										<ul><li>Loading...</li></ul>
									</div>
								</div>
							</div>
							<div class="col-lg-3 footer_col clearfix">
								<div class="footer_section footer_mobile">
									<div class="footer_title">Mobile</div>
									<div class="footer_mobile_content"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row copyright_row">
				<div class="col">
					<div class="copyright d-flex flex-lg-row flex-column align-items-center justify-content-start">
						<div class="cr_text">Loading...</div>
						<div class="ml-lg-auto cr_links">
							<ul class="cr_list"></ul>
						</div>
					</div>
				</div>
			</div>
		</div>
	</footer>

</div>

<!-- Core Scripts -->
<script src="/js/jquery-3.2.1.min.js"></script>
<script src="/styles/bootstrap4/popper.js"></script>
<script src="/styles/bootstrap4/bootstrap.min.js"></script>

<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Strapi API Integration -->
<script src="/config.js"></script>
<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/site-data.js"></script>
<script src="/js/header.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/dark-mode.js"></script>
<script src="/js/static-page.js"></script>
<script src="/js/seo-preview.js"></script>
<script src="/js/custom.js"></script>

</body>
</html>
