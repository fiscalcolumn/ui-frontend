<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d4a6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14bdee;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#14bdee;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="500" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="500" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="500" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="500" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Decorative chart bars -->
  <rect x="220" y="310" width="30" height="80" fill="#14bdee" opacity="0.15" rx="2"/>
  <rect x="265" y="270" width="30" height="120" fill="#14bdee" opacity="0.2" rx="2"/>
  <rect x="310" y="240" width="30" height="150" fill="#14bdee" opacity="0.25" rx="2"/>
  <rect x="355" y="290" width="30" height="100" fill="#14bdee" opacity="0.2" rx="2"/>
  <rect x="400" y="220" width="30" height="170" fill="#14bdee" opacity="0.3" rx="2"/>
  <rect x="445" y="260" width="30" height="130" fill="#14bdee" opacity="0.22" rx="2"/>
  <rect x="490" y="300" width="30" height="90" fill="#14bdee" opacity="0.15" rx="2"/>
  <rect x="535" y="250" width="30" height="140" fill="#14bdee" opacity="0.25" rx="2"/>

  <!-- Trend line -->
  <polyline points="220,350 265,310 310,270 355,320 400,240 445,280 490,330 535,270 570,255"
    fill="none" stroke="#14bdee" stroke-width="2" stroke-opacity="0.5" stroke-linejoin="round"/>

  <!-- Logo mark: FF monogram -->
  <text x="400" y="185" font-family="Georgia, serif" font-size="36" font-weight="700"
    fill="#ffffff" fill-opacity="0.12" text-anchor="middle" letter-spacing="8">FISCAL FINANCE</text>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="800" height="3" fill="url(#line)" />
</svg>
